seed: 7
run_dir: runs/local_smoke

data:
  num_train_scenes: 64
  num_val_scenes: 16
  history_steps: 8
  future_steps: 12
  num_agents: 8
  num_candidates: 64
  dt: 0.2

model:
  hidden_dim: 128

train:
  batch_size: 8
  epochs: 2
  learning_rate: 0.001
  device: auto

planner:
  collision_weight: 8.0
  offroad_weight: 3.0
  comfort_weight: 0.1
  progress_weight: 1.0
